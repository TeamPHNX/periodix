services:
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        env_file:
            - .env
        environment:
            # Pulled from .env
            POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
            POSTGRES_DB: periodix
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 10

    backend:
        build:
            context: ./periodix-backend
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env
        environment:
            # Use dynamic credentials so changing them in .env propagates
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/periodix?schema=public
            NODE_ENV: ${NODE_ENV:?NODE_ENV must be set in .env}
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
            PORT: ${PORT:-3001}
            PERIODIX_MASTER_KEY: ${PERIODIX_MASTER_KEY:?PERIODIX_MASTER_KEY must be set in .env}
            # Set CORS_ORIGIN explicitly in .env. For local multi-LAN-IP dev, use CORS_ORIGIN=*.
            CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set in .env}
            # Skip prisma generate at runtime because it's already done in build stage; set to 0 to force regenerate
            PRISMA_SKIP_RUNTIME_GENERATE: 1
        ports:
            - '3001:3001'
        healthcheck:
            test: ['CMD', 'curl', '-fsS', 'http://localhost:3001/health']
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 40s
        restart: unless-stopped

    frontend:
        build:
            context: ./periodix-frontend
            dockerfile: Dockerfile
        depends_on:
            backend:
                condition: service_healthy
        ports:
            - '${WEB_PORT:-8080}:80'
        env_file:
            - .env
        restart: unless-stopped

volumes:
    pgdata:
